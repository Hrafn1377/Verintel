{% extends "base.html" %}

{% block title %}Employer Registration — Verintel{% endblock %}
{% block robots %}<meta name="robots" content="noindex, nofollow">{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Register as an Employer</h1>
        <p>Set up your employer account to start posting verified jobs.</p>

        <form method="POST" action="/employer/register">
            <div class="form-group">
                <label for="company_name">Company Name</label>
                <input type="text" id="company_name" name="company_name" placeholder="Acme Corp" required>
            </div>
            <div class="form-group">
                <label for="company_domain">Company Website</label>
                <input type="text" id="company_domain" name="company_domain" placeholder="acme.com" required>
            </div>
            <div class="form-group">
                <label for="company_phone">Company Phone</label>
                <input type="text" id="company_phone" name="company_phone" placeholder="+1 555 123 4567">
            </div>
            <div class="form-group">
                <label for="company_country">Country</label>
                <select id="company_country" name="company_country">
                    <option value="us" selected>United States</option>
                    <option value="gb">United Kingdom</option>
                    <option value="ca">Canada</option>
                    <option value="au">Australia</option>
                    <option value="de">Germany</option>
                    <option value="fr">France</option>
                    <option value="ie">Ireland</option>
                    <option value="in">India</option>
                    <option value="ph">Philippines</option>
                </select>
            </div>
            <button type="submit" class="btn">Create Employer Account</button>
        </form>
    </div>
</div>
{% endblock %}
