<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Verintel{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Verintel</a>
            <ul>
                <li><a href="/jobs">Jobs</a></li>
                <li><a href="/verify">Verify</a></li>
                <li><a href="/about">About</a></li>
                {% if user %}
                <li><a href="/cv">CV Builder</a></li>
                <li><a href="/profile">Profile</a></li>
                <form method="post" action="/auth/logout" style="display:inline">
                    <button type="submit" class="nav-btn">Sign out</button>
                </form>
                {% else %}
                <li><a href="/auth/login">Sign in</a></li>
                <li><a href="/auth/register">Join</a></li>
                {% endif %}
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Verintel &mdash; protecting job seekers since 2026</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
