<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Verintel — Find jobs you can trust{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Verintel scores and verifies job postings, flags fraudulent recruiters, and helps job seekers find legitimate work.{% endblock %}">
    {% block robots %}<meta name="robots" content="index, follow">{% endblock %}

    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}Verintel — Find jobs you can trust{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Verintel scores and verifies job postings, flags fraudulent recruiters, and helps job seekers find legitimate work.{% endblock %}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:url" content="{% block og_url %}https://verintel.com{% endblock %}">
    <meta property="og:site_name" content="Verintel">

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% block twitter_title %}Verintel — Find jobs you can trust{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Verintel scores and verifies job postings, flags fraudulent recruiters, and helps job seekers find legitimate work.{% endblock %}">

    <link rel="canonical" href="{% block canonical %}https://verintel.com{% endblock %}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/css/main.css">
<body>
    <header>
        <nav>
            <a href="/" class="logo">
                <img src="/static/high-resolution-logo-grayscale.png" alt="Verintel" height="64">
            </a>
            <ul>
                <li><a href="/jobs">Jobs</a></li>
                <li><a href="/verify">Verify</a></li>
                <li><a href="/about">About</a></li>
                {% if user %}
                <li><a href="/cv">CV Builder</a></li>
                <li><a href="/profile">Profile</a></li>
                <form method="post" action="/auth/logout" style="display:inline">
                    <button type="submit" class="nav-btn">Sign out</button>
                </form>
                {% else %}
                <li><a href="/auth/login">Sign in</a></li>
                <li><a href="/auth/register">Join</a></li>
                {% endif %}
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Verintel &mdash; protecting job seekers since 2026</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
