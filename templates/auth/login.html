{% extends "base.html" %}

{% block title %}Sign in — Verintel{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Sign in</h1>
        <p>Welcome back to Verintel.</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="auth-success">{{ success }}</div>
        {% endif %}

        <form method="post" action="/auth/login">
            <input type="email"
                   name="email"
                   placeholder="Email address"
                   required
                   autocomplete="email">
            <input type="password"
                   name="password"
                   placeholder="Password"
                   required
                   autocomplete="current-password">
            <button type="submit">Sign in</button>
        </form>

        <p class="auth-link">Don't have an account? <a href="/auth/register">Create one</a></p>
    </div>
</div>
{% endblock %}
